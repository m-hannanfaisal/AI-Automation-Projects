<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Assistant</title>
<style>
  :root {
    --bg: #0b0b0d;
    --panel: #131316;
    --panel-raised: #1a1a1e;
    --border: #2a2a2e;
    --border-soft: #1f1f23;
    --text: #ededee;
    --text-dim: #8a8a90;
    --text-faint: #5a5a60;
    --accent: #4fd1a5;
    --accent-dim: #1c3a30;
    --accent-text: #07140f;
    --error: #e8736a;
    --error-bg: #2a1716;
    --radius: 10px;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 2px 8px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mark {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent-text);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-faint);
    padding: 5px 10px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .status-dot.ok { background: var(--accent); }
  .status-dot.bad { background: var(--error); }
  .status-dot.pending {
    background: #d4a94f;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* Config bar */
  .config {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .config input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s, color 0.15s;
  }

  .config input:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  .config button {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--sans);
    padding: 9px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }

  .config button:hover {
    border-color: var(--text-faint);
    color: var(--text);
  }

  /* Chat window */
  .chat-window {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    height: 440px;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 8px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    max-width: 280px;
    line-height: 1.6;
  }

  .empty-state .empty-icon {
    font-size: 22px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .row {
    display: flex;
    width: 100%;
  }

  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .bubble.user {
    background: var(--accent);
    color: var(--accent-text);
    border-bottom-right-radius: 3px;
  }

  .bubble.assistant {
    background: var(--panel-raised);
    border: 1px solid var(--border-soft);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  .bubble.error {
    background: var(--error-bg);
    border: 1px solid #4a2624;
    color: var(--error);
  }

  .bubble.loading {
    color: var(--text-faint);
    font-style: italic;
  }

  .timestamp {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .row.user .timestamp { text-align: right; }

  /* Input bar */
  .input-bar {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-bar textarea {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 12px 14px;
    border-radius: var(--radius);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .input-bar textarea:focus {
    border-color: var(--accent);
  }

  .input-bar textarea::placeholder {
    color: var(--text-faint);
  }

  .send-btn {
    background: var(--accent);
    border: none;
    color: var(--accent-text);
    width: 42px;
    height: 42px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .send-btn svg {
    width: 17px;
    height: 17px;
  }

  .footer-note {
    text-align: center;
    font-size: 10.5px;
    color: var(--text-faint);
    font-family: var(--mono);
    padding-top: 2px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="mark">DA</div>
      <div>
        <div class="header-title">Document assistant</div>
        <div class="header-sub" id="endpoint-label">127.0.0.1:8000/chat</div>
      </div>
    </div>
    <div class="status">
      <span class="status-dot pending" id="status-dot"></span>
      <span id="status-text">checking</span>
    </div>
  </div>

  <div class="config">
    <input type="text" id="endpoint-input" value="http://127.0.0.1:8000/chat" spellcheck="false">
    <button id="recheck-btn">Reconnect</button>
  </div>

  <div class="chat-window" id="chat-window">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">&#9679;</div>
      Ask a question about your documents.<br>
      Answers come from your live FastAPI backend.
    </div>
  </div>

  <div class="input-bar">
    <textarea id="question-input" placeholder="What is in my documents?" rows="1"></textarea>
    <button class="send-btn" id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="footer-note">Runs locally &middot; requires CORS enabled on the FastAPI backend</div>

</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('question-input');
  const sendBtn = document.getElementById('send-btn');
  const endpointInput = document.getElementById('endpoint-input');
  const endpointLabel = document.getElementById('endpoint-label');
  const recheckBtn = document.getElementById('recheck-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  function getEndpoint() {
    return endpointInput.value.trim();
  }

  function setStatus(state, label) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = label;
  }

  function formatTime() {
    const d = new Date();
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role) {
    if (emptyState) emptyState.remove();

    const row = document.createElement('div');
    row.className = 'row ' + role;

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = formatTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    row.appendChild(wrap);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    return bubble;
  }

  function addLoadingMessage() {
    if (emptyState) emptyState.remove();
    const row = document.createElement('div');
    row.className = 'row assistant';
    row.id = 'loading-row';

    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant loading';
    bubble.textContent = 'Thinking...';

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  async function checkConnection() {
    const endpoint = getEndpoint();
    let base;
    try {
      base = new URL(endpoint).origin;
    } catch (e) {
      setStatus('bad', 'invalid url');
      return;
    }

    setStatus('pending', 'checking');
    endpointLabel.textContent = endpoint.replace(/^https?:\/\//, '');

    try {
      const res = await fetch(base + '/docs', { method: 'GET' });
      if (res.ok || res.status === 404) {
        setStatus('ok', 'connected');
      } else {
        setStatus('bad', 'server error');
      }
    } catch (err) {
      setStatus('bad', 'unreachable');
    }
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    const endpoint = getEndpoint();
    if (!endpoint) {
      setStatus('bad', 'no endpoint');
      return;
    }

    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const loadingBubble = addLoadingMessage();

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
      });

      if (!response.ok) {
        throw new Error('Server responded with status ' + response.status);
      }

      const data = await response.json();
      const answer = data.answer || 'No answer field in response.';

      loadingBubble.textContent = answer;
      loadingBubble.classList.remove('loading');
      setStatus('ok', 'connected');

    } catch (err) {
      loadingBubble.textContent = 'Could not reach backend: ' + err.message +
        '. Confirm uvicorn is running and CORS is enabled in your FastAPI app.';
      loadingBubble.className = 'bubble error';
      setStatus('bad', 'request failed');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendQuestion);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  recheckBtn.addEventListener('click', checkConnection);
  endpointInput.addEventListener('change', checkConnection);

  checkConnection();
</script>

</body>
</html>
